<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRAE SOLO</title>
  <link rel="stylesheet" href="src/css/main.css">
</head>
<body class="light">
  <div id="main-container">
    <!-- 标题栏 -->
    <div id="title-bar" ondragstart="return false;">
      <div id="title-bar-left">
        <div id="app-title">TRAE SOLO</div>
      </div>
      <div id="title-bar-right">

        <button id="settings-button" class="title-bar-button">
          <svg t="1775461629214" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2924" width="16" height="16">

            <path d="M540 920H484c-45 0-80-35-80-80v-20c0-5-5-10-10-10h-5c-5-5-10 0-15 5l-15 15c-15 15-35 25-60 25-20 0-40-10-55-25l-60-60c-30-30-30-80 0-110l15-15c5-5 5-10 0-15v-5c-5-5-10-10-10-15h-20c-45 0-80-35-80-80v-75c0-45 35-80 80-80h20c5 0 10-5 10-10 5-5 10-10 15-15 5-5 0-10-5-15l-15-15c-30-30-30-80 0-110l60-60c15-15 35-25 60-25 20 0 40 10 55 25l15 15c5 5 10 5 15 0h5c5-5 10-10 10-15v-20c0-45 35-80 80-80h56c40 0 75 35 75 75v20c0 5 5 10 10 10 5 5 10 10 15 15 5 5 10 0 15-5l15-15c30-30 80-30 110 0l60 60c15-15 25-35 25-60 0-20-10-40-25-55l-15-15c-5-5-10-5-15 0-5 5-10 10-15 15-5 5-10 0-15-5h-20c-40 0-75 35-75 75v75c0 40 35 75 75 75h20c5 0 10 5 15 10 5 5 10 10 15 15 5 5 0 10-5 15l-15 15c-30 30-80 30-110 0l-60-60c-15 15-25 35-25 60 0 20 10 40 25 55l15 15c5 5 10 5 15 0 5-5 10-10 15-15 5-5 10 0 15 5h20c40 0 75 35 75 75v75c0 40-35 75-75 75z" fill="currentColor" p-id="2926"></path>
          </svg>
        </button>
        <button id="minimize-button" class="title-bar-button">
          <svg t="1775461518204" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="1358" width="16" height="16">
            <path d="M800 452H224c-33.137 0-60 26.863-60 60s26.863 60 60 60h576c33.137 0 60-26.863 60-60s-26.863-60-60-60z" fill="currentColor" p-id="1359"></path>
          </svg>
        </button>
        <button id="maximize-button" class="title-bar-button">
          <svg t="1775461534644" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="1515" width="16" height="16">
            <path d="M900 64H360c-33.137 0-60 26.863-60 60v146H124c-33.137 0-60 26.863-60 60v570c0 33.137 26.863 60 60 60h570c33.137 0 60-26.863 60-60V724h146c33.137 0 60-26.863 60-60V124c0-33.137-26.863-60-60-60zM664 634v176c0 33.137-26.863 60-60 60H214c-33.137 0-60-26.863-60-60V420c0-33.137 26.863-60 60-60h390c33.137 0 60 26.863 60 60v214z m206-60c0 33.137-26.863 60-60 60h-56V330c0-33.137-26.863-60-60-60H390v-56c0-33.137 26.863-60 60-60h360c33.137 0 60 26.863 60 60v360z" fill="currentColor" p-id="1516"></path>
          </svg>
        </button>
        <button id="close-button" class="title-bar-button">
          <svg t="1775461488259" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="1200" width="16" height="16">
            <path d="M828.784 828.784c-23.431 23.431-61.421 23.431-84.853 0L195.216 280.069c-23.431-23.431-23.431-61.421 0-84.853 23.431-23.431 61.421-23.431 84.853 0l548.715 548.715c23.431 23.431 23.431 61.421 0 84.853z" fill="currentColor" p-id="1201"></path>
            <path d="M195.216 828.784c-23.431-23.431-23.431-61.421 0-84.853l548.715-548.715c23.431-23.431 61.421-23.431 84.853 0 23.431 23.431 23.431 61.421 0 84.853L280.069 828.784c-23.431 23.431-61.421 23.431-84.853 0z" fill="currentColor" p-id="1202"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- 内容区域 -->
    <div id="content-area">
      <webview id="main-webview" src="https://solo.trae.cn/" webpreferences="nodeIntegration=true,contextIsolation=false"></webview>
    </div>

    <!-- 设置面板 -->
    <div id="settings-panel">
      <div id="settings-content">
        <h3 style="margin-bottom: 20px;">设置</h3>
        <div class="setting-item">
          <div class="setting-label">服务器</div>
          <div class="setting-control">
            <select id="domain-select">
              <option value="cn">国内版 (solo.trae.cn)</option>
              <option value="ai">国际版 (solo.trae.ai)</option>
            </select>
          </div>
        </div>
        <div class="setting-item">
          <div class="setting-label">深色模式</div>
          <div class="setting-control">
            <label class="toggle-switch">
              <input type="checkbox" id="dark-mode-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- 预约弹窗 -->
    <div id="reserve-modal">
      <div id="reserve-modal-content">
        <div id="reserve-modal-header">
          <div id="reserve-modal-title">预约 Windows 版本</div>
          <button id="reserve-modal-close">
            <svg t="1775461488259" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="1200" width="20" height="20">
              <path d="M828.784 828.784c-23.431 23.431-61.421 23.431-84.853 0L195.216 280.069c-23.431-23.431-23.431-61.421 0-84.853 23.431-23.431 61.421-23.431 84.853 0l548.715 548.715c23.431 23.431 23.431 61.421 0 84.853z" fill="currentColor" p-id="1201"></path>
              <path d="M195.216 828.784c-23.431-23.431-23.431-61.421 0-84.853l548.715-548.715c23.431-23.431 61.421-23.431 84.853 0 23.431 23.431 23.431 61.421 0 84.853L280.069 828.784c-23.431 23.431-61.421 23.431-84.853 0z" fill="currentColor" p-id="1202"></path>
            </svg>
          </button>
        </div>
        <div id="reserve-modal-body">
          <webview id="reserve-webview" src="https://www.trae.ai/download#solo-download" webpreferences="nodeIntegration=true,contextIsolation=false"></webview>
        </div>
      </div>
    </div>
  </div>

  <script src="src/js/main.js"></script>
</body>
</html>
