<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRAE SOLO</title>
  <link rel="stylesheet" href="src/css/main.css">
</head>
<body class="light">
  <div id="main-container">
    <!-- 标题栏 -->
    <div id="title-bar" ondragstart="return false;">
      <div id="title-bar-left">
        <div id="app-title">TRAE SOLO</div>
      </div>
      <div id="title-bar-right">
        <button id="reserve-button" class="title-bar-button">预约</button>
        <button id="settings-button" class="title-bar-button">⚙️</button>
        <button id="minimize-button" class="title-bar-button">−</button>
        <button id="maximize-button" class="title-bar-button">□</button>
        <button id="close-button" class="title-bar-button">×</button>
      </div>
    </div>

    <!-- 内容区域 -->
    <div id="content-area">
      <webview id="main-webview" src="https://solo.trae.cn/" webpreferences="nodeIntegration=true,contextIsolation=false"></webview>
    </div>

    <!-- 设置面板 -->
    <div id="settings-panel">
      <div id="settings-content">
        <h3 style="margin-bottom: 20px;">设置</h3>
        <div class="setting-item">
          <div class="setting-label">服务器</div>
          <div class="setting-control">
            <select id="domain-select">
              <option value="cn">国内版 (solo.trae.cn)</option>
              <option value="ai">国际版 (solo.trae.ai)</option>
            </select>
          </div>
        </div>
        <div class="setting-item">
          <div class="setting-label">深色模式</div>
          <div class="setting-control">
            <label class="toggle-switch">
              <input type="checkbox" id="dark-mode-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- 预约弹窗 -->
    <div id="reserve-modal">
      <div id="reserve-modal-content">
        <div id="reserve-modal-header">
          <div id="reserve-modal-title">预约 Windows 版本</div>
          <button id="reserve-modal-close">×</button>
        </div>
        <div id="reserve-modal-body">
          <webview id="reserve-webview" src="https://www.trae.ai/download#solo-download" webpreferences="nodeIntegration=true,contextIsolation=false"></webview>
        </div>
      </div>
    </div>
  </div>

  <script src="src/js/main.js"></script>
</body>
</html>
