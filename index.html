<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRAE SOLO</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      overflow: hidden;
      transition: background-color 0.3s ease;
    }

    body.light {
      background-color: #ffffff;
      color: #000000;
    }

    body.dark {
      background-color: #1a1a1a;
      color: #ffffff;
    }

    /* 主容器 */
    #main-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 标题栏 */
    #title-bar {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      user-select: none;
      transition: background-color 0.3s ease;
    }

    body.light #title-bar {
      background-color: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
    }

    body.dark #title-bar {
      background-color: #2d2d2d;
      border-bottom: 1px solid #3d3d3d;
    }

    /* 标题栏左侧 */
    #title-bar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #app-title {
      font-size: 16px;
      font-weight: 600;
    }

    /* 标题栏右侧 */
    #title-bar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* 按钮样式 */
    .title-bar-button {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
      font-size: 14px;
    }

    body.light .title-bar-button {
      background-color: transparent;
      color: #333333;
    }

    body.dark .title-bar-button {
      background-color: transparent;
      color: #e0e0e0;
    }

    body.light .title-bar-button:hover {
      background-color: #e9ecef;
    }

    body.dark .title-bar-button:hover {
      background-color: #3d3d3d;
    }

    /* 操作按钮 */
    #minimize-button:hover {
      background-color: rgba(0, 0, 0, 0.1);
    }

    #maximize-button:hover {
      background-color: rgba(0, 0, 0, 0.1);
    }

    #close-button:hover {
      background-color: #ff5f56;
      color: white;
    }

    /* 预约按钮 */
    #reserve-button {
      background-color: #0070f3;
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
    }

    #reserve-button:hover {
      background-color: #0056b3;
    }

    /* 内容区域 */
    #content-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* WebView */
    webview {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 设置面板 */
    #settings-panel {
      position: absolute;
      top: 60px;
      right: 0;
      width: 300px;
      height: calc(100vh - 60px);
      transition: transform 0.3s ease;
      transform: translateX(100%);
      z-index: 100;
      overflow-y: auto;
    }

    #settings-panel.open {
      transform: translateX(0);
    }

    body.light #settings-panel {
      background-color: #ffffff;
      border-left: 1px solid #e9ecef;
    }

    body.dark #settings-panel {
      background-color: #2d2d2d;
      border-left: 1px solid #3d3d3d;
    }

    /* 设置面板内容 */
    #settings-content {
      padding: 20px;
    }

    .setting-item {
      margin-bottom: 20px;
    }

    .setting-label {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .setting-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* 域名选择 */
    #domain-select {
      flex: 1;
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #ced4da;
      background-color: #ffffff;
      color: #333333;
    }

    body.dark #domain-select {
      background-color: #3d3d3d;
      border-color: #4d4d4d;
      color: #e0e0e0;
    }

    /* 深色模式切换 */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background-color: #0070f3;
    }

    input:checked + .toggle-slider:before {
      transform: translateX(26px);
    }

    /* 预约弹窗 */
    #reserve-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    #reserve-modal.open {
      opacity: 1;
      visibility: visible;
    }

    #reserve-modal-content {
      width: 500px;
      height: 400px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    body.light #reserve-modal-content {
      background-color: #ffffff;
    }

    body.dark #reserve-modal-content {
      background-color: #2d2d2d;
    }

    #reserve-modal-header {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid #e9ecef;
    }

    body.dark #reserve-modal-header {
      border-bottom: 1px solid #3d3d3d;
    }

    #reserve-modal-title {
      font-size: 16px;
      font-weight: 600;
    }

    #reserve-modal-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 5px;
      border-radius: 4px;
    }

    body.light #reserve-modal-close {
      color: #333333;
    }

    body.dark #reserve-modal-close {
      color: #e0e0e0;
    }

    body.light #reserve-modal-close:hover {
      background-color: #e9ecef;
    }

    body.dark #reserve-modal-close:hover {
      background-color: #3d3d3d;
    }

    #reserve-modal-body {
      height: calc(100% - 50px);
    }

    #reserve-modal-body webview {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body class="light">
  <div id="main-container">
    <!-- 标题栏 -->
    <div id="title-bar" ondragstart="return false;">
      <div id="title-bar-left">
        <div id="app-title">TRAE SOLO</div>
      </div>
      <div id="title-bar-right">
        <button id="reserve-button" class="title-bar-button">预约</button>
        <button id="settings-button" class="title-bar-button">⚙️</button>
        <button id="minimize-button" class="title-bar-button">−</button>
        <button id="maximize-button" class="title-bar-button">□</button>
        <button id="close-button" class="title-bar-button">×</button>
      </div>
    </div>

    <!-- 内容区域 -->
    <div id="content-area">
      <webview id="main-webview" src="https://solo.trae.cn/" webpreferences="nodeIntegration=true,contextIsolation=false"></webview>
    </div>

    <!-- 设置面板 -->
    <div id="settings-panel">
      <div id="settings-content">
        <h3 style="margin-bottom: 20px;">设置</h3>
        <div class="setting-item">
          <div class="setting-label">服务器</div>
          <div class="setting-control">
            <select id="domain-select">
              <option value="cn">国内版 (solo.trae.cn)</option>
              <option value="ai">国际版 (solo.trae.ai)</option>
            </select>
          </div>
        </div>
        <div class="setting-item">
          <div class="setting-label">深色模式</div>
          <div class="setting-control">
            <label class="toggle-switch">
              <input type="checkbox" id="dark-mode-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- 预约弹窗 -->
    <div id="reserve-modal">
      <div id="reserve-modal-content">
        <div id="reserve-modal-header">
          <div id="reserve-modal-title">预约 Windows 版本</div>
          <button id="reserve-modal-close">×</button>
        </div>
        <div id="reserve-modal-body">
          <webview id="reserve-webview" src="https://www.trae.ai/download#solo-download" webpreferences="nodeIntegration=true,contextIsolation=false"></webview>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer, remote } = require('electron');
    const { BrowserWindow } = remote;

    // 获取DOM元素
    const mainWebview = document.getElementById('main-webview');
    const settingsPanel = document.getElementById('settings-panel');
    const settingsButton = document.getElementById('settings-button');
    const domainSelect = document.getElementById('domain-select');
    const darkModeToggle = document.getElementById('dark-mode-toggle');
    const reserveButton = document.getElementById('reserve-button');
    const reserveModal = document.getElementById('reserve-modal');
    const reserveModalClose = document.getElementById('reserve-modal-close');
    const reserveWebview = document.getElementById('reserve-webview');
    const minimizeButton = document.getElementById('minimize-button');
    const maximizeButton = document.getElementById('maximize-button');
    const closeButton = document.getElementById('close-button');

    // 窗口控制
    minimizeButton.addEventListener('click', () => {
      remote.getCurrentWindow().minimize();
    });

    maximizeButton.addEventListener('click', () => {
      const win = remote.getCurrentWindow();
      if (win.isMaximized()) {
        win.unmaximize();
      } else {
        win.maximize();
      }
    });

    closeButton.addEventListener('click', () => {
      remote.getCurrentWindow().close();
    });

    // 标题栏拖拽
    const titleBar = document.getElementById('title-bar');
    titleBar.addEventListener('mousedown', (e) => {
      if (e.target === titleBar || e.target === document.getElementById('app-title')) {
        remote.getCurrentWindow().startDrag();
      }
    });

    // 设置面板
    settingsButton.addEventListener('click', () => {
      settingsPanel.classList.toggle('open');
    });

    // 预约弹窗
    reserveButton.addEventListener('click', () => {
      reserveModal.classList.add('open');
    });

    reserveModalClose.addEventListener('click', () => {
      reserveModal.classList.remove('open');
    });

    // 点击弹窗外部关闭
    reserveModal.addEventListener('click', (e) => {
      if (e.target === reserveModal) {
        reserveModal.classList.remove('open');
      }
    });

    // 加载设置
    ipcRenderer.send('get-settings');
    ipcRenderer.on('settings', (event, settings) => {
      domainSelect.value = settings.domain;
      darkModeToggle.checked = settings.darkMode;
      updateTheme(settings.darkMode);
      updateDomain(settings.domain);
    });

    // 域名切换
    domainSelect.addEventListener('change', (e) => {
      const domain = e.target.value;
      ipcRenderer.send('update-settings', { domain });
      updateDomain(domain);
    });

    // 深色模式切换
    darkModeToggle.addEventListener('change', (e) => {
      const darkMode = e.target.checked;
      ipcRenderer.send('update-settings', { darkMode });
      updateTheme(darkMode);
    });

    // 更新主题
    function updateTheme(darkMode) {
      if (darkMode) {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
      } else {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
      }
    }

    // 更新域名
    function updateDomain(domain) {
      const url = domain === 'cn' ? 'https://solo.trae.cn/' : 'https://solo.trae.ai/';
      mainWebview.src = url;
    }

    // 处理下载请求
    mainWebview.addEventListener('will-download', (e) => {
      const url = e.url;
      ipcRenderer.send('download-request', url);
      
      ipcRenderer.once('download-path', (event, filePath) => {
        if (filePath) {
          e.savePath = filePath;
        } else {
          e.cancel();
        }
      });
    });

    // 处理外部链接
    mainWebview.addEventListener('new-window', (e) => {
      const url = e.url;
      const currentUrl = mainWebview.src;
      const currentDomain = new URL(currentUrl).hostname;
      const targetDomain = new URL(url).hostname;

      if (targetDomain !== currentDomain) {
        e.preventDefault();
        createExternalWindow(url);
      }
    });

    // 创建外部链接窗口
    function createExternalWindow(url) {
      const win = new BrowserWindow({
        width: 1000,
        height: 700,
        frame: false,
        webPreferences: {
          nodeIntegration: true,
          contextIsolation: false
        }
      });

      win.loadFile('external-window.html', {
        query: { url }
      });
    }

    // 预约窗口的下载处理
    reserveWebview.addEventListener('will-download', (e) => {
      const url = e.url;
      ipcRenderer.send('download-request', url);
      
      ipcRenderer.once('download-path', (event, filePath) => {
        if (filePath) {
          e.savePath = filePath;
        } else {
          e.cancel();
        }
      });
    });
  </script>
</body>
</html>
