      </div>
    </div>

    <div id="content-area">
      <div id="loading-indicator">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
      </div>
      <webview id="main-webview" 
        src="https://solo.trae.cn/"
        allowpopups
        allowfullscreen
      ></webview>
    </div>

    <div id="settings-panel">
      <div id="settings-content">
        <h3 style="margin-bottom: 20px;">设置</h3>
        <div class="setting-item">
          <div class="setting-label">服务器</div>
          <div class="setting-control">
            <select id="domain-select">
              <option value="cn">国内版 (solo.trae.cn)</option>
              <option value="ai">国际版 (solo.trae.ai)</option>
            </select>
          </div>
        </div>
        <div class="setting-item">
          <div class="setting-label">深色模式</div>
          <div class="setting-control">
            <label class="toggle-switch">
              <input type="checkbox" id="dark-mode-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="setting-item">
          <div class="setting-label">关闭时隐藏到托盘</div>
          <div class="setting-control">
            <label class="toggle-switch">
              <input type="checkbox" id="close-to-tray-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="setting-item">
          <div class="setting-label">开机自启动</div>
          <div class="setting-control">
            <label class="toggle-switch">
              <input type="checkbox" id="auto-start-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="src/renderer/shared/window-controls.js"></script>
  <script src="src/renderer/shared/theme-manager.js"></script>
  <script src="src/js/main.js"></script>
</body>
</html>
