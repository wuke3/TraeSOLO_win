<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外部链接</title>
  <link rel="stylesheet" href="src/css/external-window.css">
</head>
<body class="light">
  <div id="main-container">
    <!-- 标题栏 -->
    <div id="title-bar" ondragstart="return false;">
      <div id="title-bar-left">
        <div id="app-title">外部链接</div>
      </div>
      <div id="title-bar-right">
        <button id="minimize-button" class="title-bar-button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button id="maximize-button" class="title-bar-button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          </svg>
        </button>
        <button id="close-button" class="title-bar-button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- 内容区域 -->
    <div id="content-area">
      <webview id="external-webview" webpreferences="nodeIntegration=true,contextIsolation=false"></webview>
    </div>
  </div>

  <script src="src/js/external-window.js"></script>
</body>
</html>
