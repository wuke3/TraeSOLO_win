<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外部链接</title>
  <link rel="stylesheet" href="src/css/external-window.css">
</head>
<body class="light">
  <div id="main-container">
    <!-- 标题栏 -->
    <div id="title-bar" ondragstart="return false;">
      <div id="title-bar-left">
        <div id="app-title">外部链接</div>
      </div>
      <div id="title-bar-right">
        <button id="minimize-button" class="title-bar-button">−</button>
        <button id="maximize-button" class="title-bar-button">□</button>
        <button id="close-button" class="title-bar-button">×</button>
      </div>
    </div>

    <!-- 内容区域 -->
    <div id="content-area">
      <webview id="external-webview" webpreferences="nodeIntegration=true,contextIsolation=false"></webview>
    </div>
  </div>

  <script src="src/js/external-window.js"></script>
</body>
</html>
